[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build && cp -r dist backend/public && cd backend && npm install --include=dev && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma db push --accept-data-loss && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
