# This Railway service deploys only the Vite frontend from the repository root.
# The backend is deployed separately from /backend.
[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npx serve -s dist -l tcp://0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
